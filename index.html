<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dataset Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <span class="brand-mark">⟡</span>
      <div>
        <h1 id="appTitle">Dataset Explorer</h1>
        <p class="subtitle" id="appSubtitle">Filter the sample, watch the numbers move.</p>
      </div>
    </div>
    <div class="gauge" id="gauge">
      <div class="gauge-fill" id="gaugeFill"></div>
      <div class="gauge-text">
        <span id="gaugeCount">0</span> of <span id="gaugeTotal">0</span> records selected
        <span class="gauge-pct" id="gaugePct">(0%)</span>
      </div>
    </div>
  </div>
</header>

<main class="layout">

  <aside class="filters" id="filters">
    <div class="filters-head">
      <h2>Filters</h2>
      <button class="reset-btn" id="resetBtn" type="button">Reset all</button>
    </div>
    <div id="filterControls"><!-- generated by app.js --></div>
  </aside>

  <section class="content">
    <div class="stats-grid" id="statsGrid"><!-- generated by app.js --></div>

    <div class="breakdowns" id="breakdowns"><!-- generated by app.js --></div>
  </section>

</main>

<footer class="foot">
  <p>Built as a static, no-backend dashboard. Swap in your own CSV and edit <code>js/app.js</code> → <code>CONFIG</code> to relabel it.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>
